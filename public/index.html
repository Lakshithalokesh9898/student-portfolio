<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2>My Portfolio</h2>

    <button onclick="toggleDarkMode()">🌙</button>

    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HOME -->
  <section id="home">
    <h1>Welcome to My Portfolio</h1>
    <p>I am a student learning full stack development 🚀</p>
  </section>

  <!-- SKILLS (NEW FEATURE 🔥) -->
  <section id="skills">
    <h2>My Skills</h2>

    <p>HTML</p>
    <div class="bar"><div class="html"></div></div>

    <p>CSS</p>
    <div class="bar"><div class="css"></div></div>

    <p>JavaScript</p>
    <div class="bar"><div class="js"></div></div>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <h2>Add Project</h2>

    <form id="projectForm">
      <input type="text" id="title" placeholder="Project Title" required>
      <input type="text" id="tech" placeholder="Tech Used" required>
      <input type="text" id="image" placeholder="Image URL" required>
      <button type="submit">Add Project</button>
    </form>

    <p id="msg"></p>

    <!-- SEARCH BAR 🔍 -->
    <input type="text" id="search" placeholder="Search projects..." onkeyup="searchProjects()">

    <h2>My Projects</h2>
    <div id="projectList"></div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Me</h2>
    <p>Email: your@email.com</p>
  </section>

  <script src="script.js"></script>

</body>
</html>
